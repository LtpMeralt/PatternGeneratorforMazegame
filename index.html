<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Generator Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { image-rendering: pixelated; width: 300px; height: 300px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-purple-400">Pattern Generator Lab</h1>
        
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-4 rounded-lg flex flex-col items-center">
                <canvas id="canvas" width="64" height="64" class="border-2 border-gray-700"></canvas>
                <div class="flex gap-2 mt-4">
                    <button id="regen" class="px-6 py-2 bg-purple-600 hover:bg-purple-500 rounded font-bold transition">Generate</button>
                    <button id="download" class="px-6 py-2 bg-green-700 hover:bg-green-600 rounded font-bold transition">Download PNG</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-gray-800 p-4 rounded border border-purple-500/30">
                    <label class="block text-sm font-semibold mb-2">AI Pattern Helper (API Powered)</label>
                    <input type="text" id="ai-prompt" placeholder="e.g. 'Generate a warm, maze-like pattern'" class="w-full bg-gray-900 border border-gray-600 p-2 rounded mb-2">
                    <button id="apply-ai" class="w-full py-1 text-sm bg-purple-800 hover:bg-purple-700 rounded transition">Query AI API</button>
                    <p id="status" class="text-xs text-gray-500 mt-2 italic">Ready for input...</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold">Algorithm Type</label>
                        <select id="algo" class="w-full bg-gray-700 p-2 rounded mt-1">
                            <optgroup label="Mathematical / Discrete">
                                <option value="lcg">Linear Congruential (LCG)</option>
                                <option value="xor">Bitwise XOR Shift</option>
                                <option value="mult">Coordinate Multiplier</option>
                            </optgroup>
                            <optgroup label="Emergent / Organic (NEW)">
                                <option value="automata">Cellular Automata</option>
                                <option value="noise">Fractal Noise</option>
                                <option value="reaction">Reaction-Diffusion</option>
                            </optgroup>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold">Grid Size</label>
                        <select id="grid-size" class="w-full bg-gray-700 p-2 rounded mt-1">
                            <option value="16">16x16</option>
                            <option value="32">32x32</option>
                            <option value="64" selected>64x64</option>
                            <option value="128">128x128</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold">Color Palette</label>
                    <select id="color-palette" class="w-full bg-gray-700 p-2 rounded mt-1">
                        <option value="generated">Generated (Raw RGB)</option>
                        <option value="warm">Warm (Reds / Yellows)</option>
                        <option value="cold">Cold (Blues / Cyans)</option>
                        <option value="set">Custom Set</option>
                    </select>
                </div>

                <div id="custom-colors" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400">Color 1 (Dark)</label>
                        <input type="color" id="color1" value="#1f0033" class="w-full bg-gray-700 p-1 rounded h-10 cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400">Color 2 (Light)</label>
                        <input type="color" id="color2" value="#00ffcc" class="w-full bg-gray-700 p-1 rounded h-10 cursor-pointer">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400">Parameter (A)</label>
                        <input type="number" id="a" value="15" class="w-full bg-gray-700 p-1 rounded">
                        <span class="text-[10px] text-gray-400">Multiplier / Iters / Scale</span>
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400">Parameter (C)</label>
                        <input type="number" id="c" value="4" class="w-full bg-gray-700 p-1 rounded">
                        <span class="text-[10px] text-gray-400">Increment / Variance / Octaves</span>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-sm font-semibold">Base Seed</label>
                    <input type="number" id="seed" value="42" class="w-full bg-gray-700 p-2 rounded">
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const regenBtn = document.getElementById('regen');
        const downloadBtn = document.getElementById('download');
        const aiBtn = document.getElementById('apply-ai');
        const status = document.getElementById('status');
        const colorPalette = document.getElementById('color-palette');
        const customColorsContainer = document.getElementById('custom-colors');

        // --- MATH & NOISE HELPERS ---
        function pseudoHash(x, y, seed) {
            let h = seed + Math.imul(x, 374761393) + Math.imul(y, 668265263);
            h = Math.imul((h ^ (h >> 13)), 1274126177);
            return ((h ^ (h >> 16)) >>> 0) / 4294967296.0;
        }

        function smoothNoise(x, y, seed) {
            let intX = Math.floor(x), intY = Math.floor(y);
            let fracX = x - intX, fracY = y - intY;
            // Smoothstep interpolation
            let tx = fracX * fracX * (3 - 2 * fracX);
            let ty = fracY * fracY * (3 - 2 * fracY);
            
            let v1 = pseudoHash(intX, intY, seed);
            let v2 = pseudoHash(intX + 1, intY, seed);
            let v3 = pseudoHash(intX, intY + 1, seed);
            let v4 = pseudoHash(intX + 1, intY + 1, seed);
            
            let i1 = v1 * (1 - tx) + v2 * tx;
            let i2 = v3 * (1 - tx) + v4 * tx;
            return i1 * (1 - ty) + i2 * ty;
        }

        function fbm(x, y, seed, octaves) {
            let total = 0, frequency = 1, amplitude = 1, maxValue = 0;
            for(let i = 0; i < octaves; i++) {
                total += smoothNoise(x * frequency, y * frequency, seed + i) * amplitude;
                maxValue += amplitude;
                amplitude *= 0.5;
                frequency *= 2.0;
            }
            return total / maxValue;
        }

        // --- CELLULAR AUTOMATA ENGINE ---
        function runCellularAutomata(size, seed, iterations) {
            let grid = new Uint8Array(size * size);
            // Seed 
            for(let i = 0; i < grid.length; i++) {
                grid[i] = pseudoHash(i % size, Math.floor(i / size), seed) > 0.5 ? 1 : 0;
            }
            let iters = Math.min(Math.max(1, Math.abs(iterations)), 100); // Cap at 100
            
            for(let it = 0; it < iters; it++) {
                let next = new Uint8Array(size * size);
                for(let y = 0; y < size; y++) {
                    for(let x = 0; x < size; x++) {
                        let sum = 0;
                        for(let dy = -1; dy <= 1; dy++) {
                            for(let dx = -1; dx <= 1; dx++) {
                                if(dx === 0 && dy === 0) continue;
                                let nx = (x + dx + size) % size;
                                let ny = (y + dy + size) % size;
                                sum += grid[ny * size + nx];
                            }
                        }
                        let current = grid[y * size + x];
                        if(current === 1 && (sum < 2 || sum > 3)) next[y * size + x] = 0;
                        else if(current === 0 && sum === 3) next[y * size + x] = 1;
                        else next[y * size + x] = current;
                    }
                }
                grid = next;
            }
            return grid;
        }

        // --- REACTION DIFFUSION ENGINE ---
        function runReactionDiffusion(size, seed, iterations, variance) {
            let grid = new Array(size * size).fill(0).map(()=>({a: 1.0, b: 0.0}));
            // Drop seeds of 'B' chemical
            for(let i = 0; i < grid.length; i++) {
                if (pseudoHash(i % size, Math.floor(i / size), seed) > 0.98) grid[i].b = 1.0;
            }
            
            let iters = Math.min(Math.max(1, Math.abs(iterations)), 200); // Cap at 200 to prevent freeze
            
            // Standard feed/kill values for complex patterns, tweaked by parameter C
            let feed = 0.055 + (variance % 10) * 0.001; 
            let kill = 0.062;
            let dA = 1.0, dB = 0.5;

            for(let it = 0; it < iters; it++) {
                let next = new Array(size * size);
                for(let y = 0; y < size; y++) {
                    for(let x = 0; x < size; x++) {
                        let aVal = grid[y * size + x].a;
                        let bVal = grid[y * size + x].b;
                        
                        let lapA = -aVal, lapB = -bVal;
                        // Convolution for diffusion
                        for(let dy = -1; dy <= 1; dy++) {
                            for(let dx = -1; dx <= 1; dx++) {
                                if(dx === 0 && dy === 0) continue;
                                let weight = (dx === 0 || dy === 0) ? 0.2 : 0.05;
                                let nx = (x + dx + size) % size;
                                let ny = (y + dy + size) % size;
                                lapA += grid[ny * size + nx].a * weight;
                                lapB += grid[ny * size + nx].b * weight;
                            }
                        }
                        
                        let reaction = aVal * bVal * bVal;
                        let newA = aVal + (dA * lapA - reaction + feed * (1 - aVal));
                        let newB = bVal + (dB * lapB + reaction - (kill + feed) * bVal);
                        
                        next[y * size + x] = {
                            a: Math.max(0, Math.min(1, newA)), 
                            b: Math.max(0, Math.min(1, newB))
                        };
                    }
                }
                grid = next;
            }
            return grid;
        }

        // --- UI EVENTS ---
        colorPalette.addEventListener('change', (e) => {
            if (e.target.value === 'set') {
                customColorsContainer.classList.remove('hidden');
            } else {
                customColorsContainer.classList.add('hidden');
            }
            generate();
        });

        document.getElementById('color1').addEventListener('input', generate);
        document.getElementById('color2').addEventListener('input', generate);

        // --- MAIN RENDER LOOP ---
        function generate() {
            const gridSize = parseInt(document.getElementById('grid-size').value);
            
            const offscreen = document.createElement('canvas');
            offscreen.width = gridSize;
            offscreen.height = gridSize;
            const offCtx = offscreen.getContext('2d');
            const imgData = offCtx.createImageData(gridSize, gridSize);
            const data = imgData.data;

            const a = parseInt(document.getElementById('a').value) || 0;
            const c = parseInt(document.getElementById('c').value) || 0;
            const seed = parseInt(document.getElementById('seed').value) || 0;
            const algo = document.getElementById('algo').value;
            const palette = colorPalette.value;

            let r1, g1, b1, r2, g2, b2;
            if (palette === 'set') {
                const hex1 = document.getElementById('color1').value;
                const hex2 = document.getElementById('color2').value;
                r1 = parseInt(hex1.substring(1,3), 16); g1 = parseInt(hex1.substring(3,5), 16); b1 = parseInt(hex1.substring(5,7), 16);
                r2 = parseInt(hex2.substring(1,3), 16); g2 = parseInt(hex2.substring(3,5), 16); b2 = parseInt(hex2.substring(5,7), 16);
            }

            // Pre-calculate emergent algorithms
            let precalcGrid = null;
            if (algo === 'automata') {
                precalcGrid = runCellularAutomata(gridSize, seed, a);
            } else if (algo === 'reaction') {
                precalcGrid = runReactionDiffusion(gridSize, seed, a, c);
            }

            for (let i = 0; i < data.length; i += 4) {
                let x = (i/4) % gridSize;
                let y = Math.floor((i/4) / gridSize);
                let state;

                // Algorithm Routing
                if (algo === 'lcg') {
                    state = ((x * a) + (y * c) + seed) % 16777216;
                } else if (algo === 'xor') {
                    state = (x * a) ^ (y * c) ^ seed;
                    state ^= (state << 13);
                    state ^= (state >> 17);
                    state ^= (state << 5);
                } else if (algo === 'mult') {
                    state = (x * a) * (y * c) + seed;
                } else if (algo === 'automata') {
                    let v = precalcGrid[y * gridSize + x] ? 255 : 0;
                    state = (v << 16) | (v << 8) | v; // Encode to 24-bit identical channels
                } else if (algo === 'noise') {
                    let scale = Math.max(1, Math.abs(a));
                    let octaves = Math.max(1, Math.abs(c) % 8 + 1);
                    let v = Math.floor(fbm(x / scale, y / scale, seed, octaves) * 255);
                    state = (v << 16) | (v << 8) | v;
                } else if (algo === 'reaction') {
                    let v = Math.floor(precalcGrid[y * gridSize + x].b * 255); // Visualize chemical B
                    state = (v << 16) | (v << 8) | v;
                }

                // Color Mapping
                if (palette === 'generated') {
                    data[i] = (state >> 16) & 0xFF;     
                    data[i + 1] = (state >> 8) & 0xFF;  
                    data[i + 2] = state & 0xFF;         
                } else {
                    const intensity = Math.abs(((state >> 16) & 0xFF) ^ ((state >> 8) & 0xFF) ^ (state & 0xFF));
                    
                    if (palette === 'warm') {
                        data[i] = 150 + (intensity / 2); 
                        data[i + 1] = intensity;         
                        data[i + 2] = intensity / 4;     
                    } else if (palette === 'cold') {
                        data[i] = intensity / 4;         
                        data[i + 1] = intensity;         
                        data[i + 2] = 150 + (intensity / 2); 
                    } else if (palette === 'set') {
                        const t = intensity / 255;
                        data[i] = r1 + (r2 - r1) * t;
                        data[i + 1] = g1 + (g2 - g1) * t;
                        data[i + 2] = b1 + (b2 - b1) * t;
                    }
                }
                data[i + 3] = 255; 
            }
            offCtx.putImageData(imgData, 0, 0);

            canvas.width = 300;
            canvas.height = 300;
            ctx.imageSmoothingEnabled = false; 
            ctx.clearRect(0, 0, 300, 300);
            ctx.drawImage(offscreen, 0, 0, 300, 300);

            window.currentPattern = offscreen; 
        }

        async function queryAI() {
            const prompt = document.getElementById('ai-prompt').value;
            status.innerText = "Consulting Gemini AI...";
            const apiKey = ""; 
            
            try {
                const systemPrompt = "You are a pattern generator AI. Return JSON configuring the generator.\nalgo options: 'lcg', 'xor', 'mult', 'automata' (living structures), 'noise' (clouds/terrain), 'reaction' (coral/veins).\ncolorPalette: 'generated', 'warm', 'cold', 'set'.\na and c: Integers. For automata: 'a' is iterations (10-50). For noise: 'a' is scale (5-20), 'c' is octaves (1-6). For reaction: 'a' is iterations (50-200), 'c' is variance (1-10).\nseed: Random integer.\ngridSize: Choose one of 16, 32, 64, 128.";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    algo: { type: "STRING", enum: ["lcg", "xor", "mult", "automata", "noise", "reaction"] },
                                    colorPalette: { type: "STRING", enum: ["generated", "warm", "cold", "set"] },
                                    a: { type: "INTEGER" },
                                    c: { type: "INTEGER" },
                                    seed: { type: "INTEGER" },
                                    gridSize: { type: "INTEGER" }
                                }
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error("API Error");
                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                
                document.getElementById('algo').value = data.algo;
                document.getElementById('a').value = data.a;
                document.getElementById('c').value = data.c;
                document.getElementById('seed').value = data.seed;
                colorPalette.value = data.colorPalette || 'generated';
                
                if (colorPalette.value === 'set') {
                    customColorsContainer.classList.remove('hidden');
                } else {
                    customColorsContainer.classList.add('hidden');
                }
                
                const validGrids = [16, 32, 64, 128];
                const closestGrid = validGrids.reduce((prev, curr) => Math.abs(curr - data.gridSize) < Math.abs(prev - data.gridSize) ? curr : prev);
                document.getElementById('grid-size').value = closestGrid;
                
                generate();
                status.innerText = "Pattern updated by AI!";
            } catch (err) {
                console.error(err);
                status.innerText = "API Error. Using fallback...";
                document.getElementById('algo').value = 'noise';
                document.getElementById('a').value = 10;
                document.getElementById('c').value = 4;
                colorPalette.value = 'cold';
                generate();
            }
        }

        aiBtn.addEventListener('click', queryAI);
        
        const newDownloadBtn = downloadBtn.cloneNode(true);
        downloadBtn.parentNode.replaceChild(newDownloadBtn, downloadBtn);
        newDownloadBtn.addEventListener('click', () => {
            if (!window.currentPattern) return;
            const outCanvas = document.createElement('canvas');
            outCanvas.width = 1000;
            outCanvas.height = 1000;
            const outCtx = outCanvas.getContext('2d');
            
            outCtx.imageSmoothingEnabled = false;
            outCtx.drawImage(window.currentPattern, 0, 0, 1000, 1000);
            
            const link = document.createElement('a');
            const size = document.getElementById('grid-size').value;
            link.download = `pattern-${size}x${size}-1000px.png`;
            link.href = outCanvas.toDataURL();
            link.click();
        });

        const newRegenBtn = regenBtn.cloneNode(true);
        regenBtn.parentNode.replaceChild(newRegenBtn, regenBtn);
        newRegenBtn.addEventListener('click', generate);

        document.getElementById('grid-size').addEventListener('change', generate);
        document.getElementById('algo').addEventListener('change', generate);
        document.getElementById('a').addEventListener('input', generate);
        document.getElementById('c').addEventListener('input', generate);
        document.getElementById('seed').addEventListener('input', generate);
        
        generate();
    </script>
</body>
</html>
